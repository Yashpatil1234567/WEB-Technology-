<section class="student-list">
  <div class="student-card">
    <h2>Student List</h2>

    <ul>
      <li *ngFor="let student of students">
        <span>{{ student.name }}</span>
        <strong>{{ student.age }} years</strong>
      </li>
    </ul>

    <p *ngIf="students.length === 0">No students added yet.</p>
  </div>
</section>
