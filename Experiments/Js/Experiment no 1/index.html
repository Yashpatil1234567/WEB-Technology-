<!DOCTYPE html>
<html>
<head>
    <title>Experiment No 1</title>
</head>
<body>

<h2>Student Details</h2>
<div id="student-details"></div>
<h2>Numbers from 1 to 10</h2>
<div id="number-list"></div>

<script>
    const studentName = "Yash Patil";
    const rollNo = 109;
    const marks = 90;

    const studentDetailsDiv = document.getElementById("student-details");
    if (studentDetailsDiv) {
        studentDetailsDiv.innerHTML =
            `<p>Name: ${studentName}</p>` +
            `<p>Roll No: ${rollNo}</p>` +
            `<p>Marks: ${marks}</p>`;
    }

    const numberListDiv = document.getElementById("number-list");
    if (numberListDiv) {
        let listHtml = "";
        for (let i = 1; i <= 10; i++) {
            listHtml += `<p>${i}</p>`;
        }
        numberListDiv.innerHTML = listHtml;
    }
</script>

</body>
</html>
