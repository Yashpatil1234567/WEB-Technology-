<div class="container">
  <h2>Admin Form</h2>


  <input type="text" [(ngModel)]="fname" placeholder="First Name" /><br><br>

  <input type="text" [(ngModel)]="lname" placeholder="Last Name" /><br><br>

  <input type="email" [(ngModel)]="email" placeholder="Email" /><br><br>

  <input type="number" [(ngModel)]="age" placeholder="Age" /><br><br>

  <input type="text" [(ngModel)]="number" placeholder="Phone Number" /><br><br>


  <button (click)="showData()">Submit</button>

  <hr>


  <h3>Preview (Interpolation Output)</h3>

  <p><b>First Name:</b> {{ fname }}</p>
  <p><b>Last Name:</b> {{ lname }}</p>
  <p><b>Email:</b> {{ email }}</p>
  <p><b>Age:</b> {{ age }}</p>
  <p><b>Phone Number:</b> {{ number }}</p>

  <h3 *ngIf="submitted">Submitted Data:</h3>
  <p *ngIf="submitted">{{ message }}</p>
</div>
